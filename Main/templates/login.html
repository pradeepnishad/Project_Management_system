{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to your DealScale AI account</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="auth-btn">
                Login
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account?
            <a href="/accounts/signup/">Register as Client</a>
        </div>

    </div>

</div>

{% endblock %}
