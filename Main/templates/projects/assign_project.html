{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Assign Project - DealScale</title>

<style>

/* DealScale Theme */

body{
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-color:#f4f6fb;
    margin:0;
    padding:0;
}

/* Container */

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card Layout */

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    width:420px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* Page title */

.page-title{
    margin-bottom:25px;
    color:#333;
    text-align:center;
}

/* Form fields */

.assign-form p{
    margin-bottom:15px;
}

.assign-form input,
.assign-form select,
.assign-form textarea{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-top:5px;
    font-size:14px;
}

/* Button */

.btn-primary{
    width:100%;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:white;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.btn-primary:hover{
    background:#3730a3;
}

/* Back button */

.back-link{
    display:block;
    margin-top:20px;
    text-align:center;
    color:#4f46e5;
    text-decoration:none;
    font-weight:500;
}

.back-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2 class="page-title">Assign Project: {{ project.title }}</h2>

        <form method="post" class="assign-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-primary">Assign Project</button>
        </form>

        <a href="{% url 'project_list' %}" class="back-link">← Back</a>

    </div>

</div>

</body>
</html>
